# Post-merge pipeline. Thin caller of the shared composition pipeline-docker.yml
# (version -> docker -> deploy-pulumi -> sync-ecr, plus sync-dev), pinned to an
# exact release of dsi-clinic/idi-ftm2j-shared. Bump the @vX.Y.Z pin to upgrade.
#
# NOTE: pin a release that includes the env-secret + caller-permissions fixes
# (v0.1.8+).
name: Deploy

on:
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write   # version bump commit, tag + release, sync-dev
  id-token: write   # OIDC: AWS (pulumi deploy + ECR)
  packages: write   # push images to GHCR

jobs:
  pipeline:
    uses: dsi-clinic/idi-ftm2j-shared/.github/workflows/pipeline-docker.yml@v0.1.9
    secrets: inherit
    with:
      app-name: corporate-structure
      images: '[{"name":"orchestrator","dockerfile":"dockerfiles/Dockerfile.orchestrator"}]'
