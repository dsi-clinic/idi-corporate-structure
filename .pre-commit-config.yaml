# Local quality gate mirroring the CI "Lint" job in
# dsi-clinic/idi-ftm2j-shared/.github/workflows/pipeline-checks.yml:
#   - ruff check .          (lint)
#   - ruff format --check . (format)
# Rules are read from pyproject.toml ([tool.ruff]). Pinned to the ruff
# version resolved in uv.lock (0.15.15) so local and CI agree.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
      - id: ruff-check
        args: [--output-format=concise]
      - id: ruff-format
        args: [--check]
