# Committed non-secret config for the prod stack (config-as-code, issue #25).
# See Pulumi.dev.yaml for what is and isn't here. Adjust per-env as needed
# (e.g. flip schedule_enabled to "true" and set the real production cron).
config:
  idi:input_file: "<REQUIRED: input path the orchestrator reads, e.g. companies.csv>"
  idi:sec_user_agent: "<REQUIRED: SEC EDGAR contact, e.g. 'IDI Clinic data@uchicago.edu'>"
  idi:cpu: "1024"
  idi:memory: "4096"
  idi:rate_limit: "0.2"
  idi:num_workers: "10"
  idi:input_sample_size: "0"
  idi:openai_model: "gpt-4.1-nano"
  idi:cron_corporate_structure: "cron(0 2 * * ? *)"
  idi:schedule_enabled: "false"
