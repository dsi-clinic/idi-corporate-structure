name: idi
runtime: python
description: AWS ECS infrastructure for IDI Corporate Structure Pipeline

config:
  aws:region:
    description: AWS region to deploy to
    value: us-east-2

  idi:app_name:
    description: Name of the application
    default: "corporate-structure"

  idi:openai_api_key:
    description: OpenAI API key (stored as secret in AWS Secrets Manager)
    secret: true

  idi:cron_corporate_structure:
    description: EventBridge cron schedule for the corporate structure processor
    default: "cron(0 2 * * ? *)"

  idi:cpu:
    description: Fargate task CPU units (256, 512, 1024, 2048, 4096)
    default: "1024"

  idi:memory:
    description: Fargate task memory in MiB (must be valid for chosen CPU)
    default: "4096"

  idi:rate_limit:
    description: SEC API rate limit in seconds between requests
    default: "0.2"

  idi:num_workers:
    description: Number of GPT extraction worker threads
    default: "10"

  idi:stale_threshold_days:
    description: Reprocess filings whose date_added is older than this; negative disables filtering
    default: "30"

  idi:input_sample_size:
    description: Number of filings to process (0 = all, >0 for testing)
    default: "0"

  idi:schedule_enabled:
    description: Whether the EventBridge schedule is enabled
    default: "false"

  idi:bucket_name:
    description: S3 bucket name for pipeline input, output, and failures (created externally)

  idi:input_file:
    description: Input file path (S3 URI or HTTPS URL)
    default: "https://www.sec.gov/Archives/edgar/daily-index/bulkdata/submissions.zip"

  idi:log_retention_days:
    description: CloudWatch log group retention in days
    default: "30"

  idi:dlq_retention_days:
    description: SQS dead-letter queue retention in days
    default: "14"

  idi:ecr_image_count:
    description: ECR image retention count
    default: "5"
